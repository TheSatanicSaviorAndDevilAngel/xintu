<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>心途 · 自我探索</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: '华文行楷', 'STKaiti', 'KaiTi', '楷体', serif;
            background: #faf7f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: #ffffffec;
            border-radius: 32px;
            padding: 28px 20px;
            border: 1px solid #d9e0c5;
            box-shadow: 0 20px 40px rgba(120,100,80,0.08);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .logo {
            width: 48px; height: 48px;
            background: #c1d0b5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #4d5d3f;
        }
        .brand {
            font-size: 28px; font-weight: 500;
            color: #4a5a3c;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .subtitle {
            font-size: 14px; color: #8f9e81;
            font-family: '华文行楷', 'KaiTi', serif;
        }
        .page { display: none; }
        .page.active { display: block; }
        .btn {
            background: #d0ddc2; border: none;
            color: #3f4d33; font-size: 20px;
            padding: 16px 28px; border-radius: 40px;
            width: 100%; cursor: pointer;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .question-card {
            background: #fefcf9;
            border-radius: 28px; padding: 28px 20px;
            border: 1px solid #d9e0c5;
        }
        .question-text {
            font-size: 22px; color: #3f4d33;
            margin-bottom: 28px; line-height: 1.6;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .number-input {
            width: 100%; padding: 18px;
            font-size: 22px; text-align: center;
            border: 2px solid #d0ddc2; border-radius: 50px;
            background: white; color: #4a5a3c;
            outline: none; margin-bottom: 12px;
        }
        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .nav-btn {
            flex: 1; background: #e5ecda;
            border: none; padding: 16px 0;
            border-radius: 40px; font-size: 18px;
            color: #4a5a3c; cursor: pointer;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .progress {
            font-size: 15px; color: #8f9e81;
            margin-bottom: 16px; text-align: center;
        }
        .footer-note {
            margin-top: 32px; font-size: 13px;
            color: #8f9e81; text-align: center;
            border-top: 1px dashed #d0ddc2; padding-top: 20px;
        }
        .copyright {
            margin-top: 24px; padding: 16px;
            background: #e5ecda; border-radius: 16px;
            font-size: 15px; color: #4a5a3c;
            text-align: center; border: 1px solid #c1d0b5;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">🧭</div>
            <div>
                <div class="brand">心途</div>
                <div class="subtitle">内在探索 · 深度画像</div>
            </div>
        </div>

        <div id="welcomePage" class="page active">
            <div class="welcome-title">你好，<br>欢迎来到心途</div>
            <div class="welcome-text" style="font-size:18px; line-height:1.8; color:#4d5d3f;">
                这是一个自我探索的角落。你会遇到45个生活片段，每个片段请用1–5分告诉我它像不像你（可用0.5分步长，例如1.5、2.5）。<br><br>
                没有标准答案，凭直觉就好。结束后，我会为你梳理一份专属的内心画像。
            </div>
            <button class="btn" id="startBtn">开始探索</button>
            <div class="footer-note">本测评结果仅供参考，不构成专业心理诊断</div>
        </div>

        <div id="quizPage" class="page">
            <div class="progress" id="progressText">第 1 / 45 题</div>
            <div class="question-card">
                <div class="question-text" id="questionText"></div>
                <div class="input-area">
                    <input type="number" id="ratingInput" class="number-input" step="0.5" min="1" max="5" placeholder="1.0 ~ 5.0">
                    <div class="hint" style="text-align:center; color:#8f9e81;">1 = 完全不像，5 = 非常像</div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" disabled>上一题</button>
                    <button class="nav-btn" id="nextBtn">下一题</button>
                </div>
            </div>
        </div>

        <div id="reportPage" class="page">
            <div id="reportContent"></div>
            <div class="copyright">
                ✦ 原创作品 · 心途 by TheSatanicSaviorAndDevilAngel ✦
            </div>
        </div>
    </div>

    <script>
        // ---------- 极简工作版 ----------
        const questions = [
            "参加完聚会或人多的地方后，你是否需要很长时间独处才能恢复精力？",
            "如果有人没经过你同意就用你的东西或靠你太近，你会不会感到烦躁甚至生气？",
            "你是否常常注意到别人忽略的细微声音、光线变化或气味？",
            "在嘈杂或混乱的环境（如超市、火车站），你是否容易感到心烦意乱，想离开？",
            "你有没有特别痴迷的爱好，可以花大量时间研究或沉浸其中？",
            "和别人聊天时，你是否有时听不懂他们的言外之意，或分不清玩笑和认真？",
            "你是否喜欢按固定的方式做事（如固定路线、固定顺序），临时改变会让你不安？",
            "你是否对某些衣服的材质、标签特别敏感，有些衣服穿上会很难受？",
            "在需要当众说话或表现之前，你是否会紧张、担心出丑？",
            "有时候想和人交流，但不知道如何开口，最终选择一个人待着？",
            "你会不会因为一件小事（如东西找不到、计划改变）突然情绪崩溃？",
            "你是否常觉得自己像个局外人，很难融入周围的人群？",
            "过去一些不愉快的经历，会不会在不经意间浮现，影响你现在的心情？",
            "你是否非常需要自己的独立空间，被打扰时会烦躁甚至发火？",
            "当你全神贯注做一件事时，别人叫你，你是不是常常听不见？",
            "在人群里，即使没人注意你，你也会感到不自在，想尽快离开？",
            "你是否会因为第二天的社交活动而提前感到紧张，甚至影响睡眠？",
            "你有没有过因为环境太吵而无法集中注意力，甚至感到头疼？",
            "你是否会反复检查门窗、电器等，确保它们处于你想要的状态？",
            "你是否曾经因为别人一句无心的话而难过很久？",
            "你是否对某些数字、颜色或物品有特别的偏好或忌讳？",
            "你是否觉得和人保持一定距离会让你更舒服，即使对方是朋友？",
            "你是否容易被他人的情绪感染，甚至比他们本人还难过或兴奋？",
            "你是否经常因为担心做不好而推迟或放弃开始一件事？",
            "你是否对某些特定的声音（如咀嚼声、空调声）特别无法忍受？",
            "你是否喜欢提前很久规划事情，并因为计划被打乱而烦躁？",
            "你是否在人群中会不自觉地观察每个人的表情和动作，试图理解他们在想什么？",
            "和新认识的人交谈时，你是否常常不知道说什么，感到尴尬？",
            "你是否尽量避免成为众人关注的焦点？",
            "你对食物的口感、温度是否特别挑剔？",
            "你是否对强光、闪光非常敏感，觉得刺眼？",
            "你是否会在头脑中反复回想某些事情，难以停止？",
            "你是否很难理解为什么有些人会那么生气或伤心？",
            "你是否经常需要别人把话说明白才能理解，无法领会暗示？",
            "你是否觉得自己不太擅长安慰别人？",
            "你的情绪波动比较大，有时会因为一点小事突然崩溃？",
            "你是否容易陷入低落情绪，难以自拔？",
            "你是否经常做噩梦，或睡眠质量不佳？",
            "你是否对某些话题或场景特别敏感，会刻意回避？",
            "你是否觉得自己很难完全信任别人？",
            "你是否经常感到疲惫，即使没做什么事？",
            "你是否不喜欢别人未经允许进入你的房间或私人空间？",
            "你是否对别人的情绪过度负责，容易感到被卷入？",
            "你是否希望别人能尊重你的隐私，不打听太多？",
            "你是否觉得很难拒绝别人的要求，即使自己已经很累了？"
        ];

        let answers = new Array(questions.length).fill(null);
        let currentIndex = 0;

        const welcomePage = document.getElementById('welcomePage');
        const quizPage = document.getElementById('quizPage');
        const reportPage = document.getElementById('reportPage');
        const startBtn = document.getElementById('startBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const questionText = document.getElementById('questionText');
        const ratingInput = document.getElementById('ratingInput');
        const progressText = document.getElementById('progressText');
        const reportContent = document.getElementById('reportContent');

        startBtn.addEventListener('click', function() {
            welcomePage.classList.remove('active');
            quizPage.classList.add('active');
            loadQuestion(0);
        });

        prevBtn.addEventListener('click', function() {
            if (currentIndex > 0) {
                saveCurrentAnswer();
                currentIndex--;
                loadQuestion(currentIndex);
            }
        });

        nextBtn.addEventListener('click', function() {
            if (ratingInput.value === '') {
                alert('请先输入一个分数');
                return;
            }
            let val = parseFloat(ratingInput.value);
            if (isNaN(val) || val < 1 || val > 5) {
                alert('请输入1-5之间的数字');
                return;
            }
            saveCurrentAnswer();
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                loadQuestion(currentIndex);
            } else {
                showReport();
            }
        });

        function loadQuestion(index) {
            questionText.innerText = questions[index];
            if (answers[index] !== null) {
                ratingInput.value = answers[index];
            } else {
                ratingInput.value = '';
            }
            progressText.innerText = `第 ${index + 1} / 45 题`;
            prevBtn.disabled = index === 0;
        }

        function saveCurrentAnswer() {
            if (ratingInput.value !== '') {
                answers[currentIndex] = parseFloat(ratingInput.value);
            }
        }

        function showReport() {
            quizPage.classList.remove('active');
            reportPage.classList.add('active');
            reportContent.innerHTML = '<div style="text-align:center; padding:40px;">感谢您的参与！完整报告将在后续版本中呈现。</div>';
        }
    </script>
</body>
</html>
