<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>心途 · 深度自我探索</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: '华文行楷', 'STKaiti', 'KaiTi', '楷体', serif;
            background: #faf7f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: #ffffffec;
            border-radius: 32px;
            padding: 28px 20px;
            border: 1px solid #d9e0c5;
            box-shadow: 0 20px 40px rgba(120,100,80,0.08);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .logo {
            width: 48px; height: 48px;
            background: #c1d0b5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #4d5d3f;
        }
        .brand {
            font-size: 28px; font-weight: 500;
            color: #4a5a3c;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .subtitle {
            font-size: 14px; color: #8f9e81;
            font-family: '华文行楷', 'KaiTi', serif;
        }
        .page { display: none; }
        .page.active { display: block; }
        .btn {
            background: #d0ddc2; border: none;
            color: #3f4d33; font-size: 20px;
            padding: 16px 28px; border-radius: 40px;
            width: 100%; cursor: pointer;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .btn:active { background: #c1d0b5; }
        .progress {
            font-size: 15px; color: #8f9e81;
            margin-bottom: 16px; text-align: center;
        }
        .question-card {
            background: #fefcf9;
            border-radius: 28px; padding: 28px 20px;
            border: 1px solid #d9e0c5;
        }
        .question-text {
            font-size: 22px; color: #3f4d33;
            margin-bottom: 28px; line-height: 1.6;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .number-input {
            width: 100%; padding: 18px;
            font-size: 22px; text-align: center;
            border: 2px solid #d0ddc2; border-radius: 50px;
            background: white; color: #4a5a3c;
            outline: none; margin-bottom: 12px;
        }
        .hint {
            font-size: 14px; color: #8f9e81;
            text-align: center; margin-bottom: 8px;
        }
        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .nav-btn {
            flex: 1; background: #e5ecda;
            border: none; padding: 16px 0;
            border-radius: 40px; font-size: 18px;
            color: #4a5a3c; cursor: pointer;
            font-family: '华文行楷', 'STKaiti', serif;
        }
        .report-section {
            background: #fefcf9;
            border-radius: 24px; padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #d9e0c5;
        }
        .dimension-title {
            font-size: 22px; font-weight: 500;
            color: #4a5a3c; margin-bottom: 16px;
            border-left: 6px solid #c1d0b5; padding-left: 14px;
        }
        .dimension-score {
            font-size: 18px; color: #8f9e81;
            margin-bottom: 8px;
        }
        .dimension-desc {
            font-size: 17px; color: #4d5d3f;
            line-height: 1.7; margin-bottom: 16px;
        }
        .overall-box {
            background: #f0f4ea;
            border-radius: 24px; padding: 22px;
            margin: 28px 0;
            border: 1px solid #c1d0b5;
        }
        .overall-text {
            font-size: 18px; color: #3f4d33;
            line-height: 1.8;
        }
        .suggestions-box {
            background: #e5ecda;
            border-radius: 24px; padding: 22px;
            margin: 28px 0;
            border: 1px solid #c1d0b5;
        }
        .possibilities {
            background: #ffffff;
            border-radius: 24px; padding: 22px;
            border: 1px solid #d9e0c5;
        }
        .footer-note {
            margin-top: 32px; font-size: 13px;
            color: #8f9e81; text-align: center;
            border-top: 1px dashed #d0ddc2; padding-top: 20px;
        }
        .copyright {
            margin-top: 24px; padding: 16px;
            background: #e5ecda; border-radius: 16px;
            font-size: 15px; color: #4a5a3c;
            text-align: center; border: 1px solid #c1d0b5;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">🧭</div>
            <div>
                <div class="brand">心途</div>
                <div class="subtitle">内在探索 · 深度画像</div>
            </div>
        </div>

        <div id="welcomePage" class="page active">
            <div class="welcome-title">你好，<br>欢迎来到心途</div>
            <div class="welcome-text" style="font-size:18px; line-height:1.8; color:#4d5d3f;">
                这是一个自我探索的角落。你会遇到100个生活片段，每个片段请用1–5分告诉我它像不像你（可用0.5分步长，例如1.5、2.5）。<br><br>
                没有标准答案，凭直觉就好。结束后，我会为你梳理一份专属的内心画像，帮助你更清晰地看见自己。
            </div>
            <button class="btn" id="startBtn">开始探索</button>
            <div class="footer-note">本测评结果仅供参考，不构成专业心理诊断</div>
        </div>

        <div id="quizPage" class="page">
            <div class="progress" id="progressText">第 1 / 100 题</div>
            <div class="question-card">
                <div class="question-text" id="questionText"></div>
                <div class="input-area">
                    <input type="number" id="ratingInput" class="number-input" step="0.5" min="1" max="5" placeholder="1.0 ~ 5.0">
                    <div class="hint">1 = 完全不像，5 = 非常像</div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" disabled>上一题</button>
                    <button class="nav-btn" id="nextBtn">下一题</button>
                </div>
            </div>
        </div>

        <div id="reportPage" class="page">
            <div id="reportContent"></div>
            <div class="copyright">
                ✦ 原创作品 · 心途 by TheSatanicSaviorAndDevilAngel ✦
            </div>
        </div>
    </div>

    <script>
        // ==================== 100道题生成函数 ====================
        function generateQuestions() {
            const questions = [];
            
            // 社交焦虑维度 (16题)
            const socialAnxietyQuestions = [
                "在需要当众发言的场合，我会提前感到紧张和不安。",
                "聚会结束后，我需要很长时间独处才能恢复精力。",
                "我害怕在众人面前出丑或被嘲笑。",
                "和不熟悉的人交谈时，我会感到不自在。",
                "我常常担心自己说错话而得罪人。",
                "人多的地方会让我感到压力。",
                "我尽量避免成为人群中的焦点。",
                "即使只是和几个人在一起，时间长了也会让我感到疲惫。",
                "我经常在社交后反复回想自己有没有说错话。",
                "和新认识的人见面之前，我会感到焦虑。",
                "我害怕主动开启一段对话。",
                "在社交场合，我常常不知道手该放哪里。",
                "如果没人主动和我说话，我会一直保持沉默。",
                "我担心别人对我的印象不好。",
                "公开场合说话时，我会心跳加速、手心出汗。",
                "我宁愿错过一些活动，也不愿主动参加陌生人的聚会。"
            ];
            
            // 感官敏感维度 (16题)
            const sensorySensitivityQuestions = [
                "嘈杂的环境会让我感到烦躁和不适。",
                "我对强光非常敏感，会觉得刺眼。",
                "某些特定的声音（如咀嚼声、空调声）会让我无法忍受。",
                "衣服的标签或某些面料会让我感到不舒服。",
                "我很容易注意到房间里的细微气味。",
                "环境的温度变化会明显影响我的心情。",
                "我对他人的情绪变化很敏感。",
                "艺术、音乐或自然风景会让我有很深的感触。",
                "我容易被突然的声响吓到。",
                "拥挤的地方会让我感到压迫感。",
                "我能够察觉到别人忽略的细节。",
                "不同食物的口感会影响我的食欲。",
                "我对别人说话的语气很敏感。",
                "房间的整洁程度会明显影响我的心情。",
                "我容易被美丽的景色打动。",
                "我对皮肤接触比较敏感，不太喜欢被突然触碰。"
            ];
            
            // 刻板兴趣维度 (16题)
            const rigidInterestQuestions = [
                "我有非常痴迷的爱好，可以花大量时间研究。",
                "我喜欢按照固定的顺序做事情。",
                "如果计划突然改变，我会感到焦虑。",
                "我会反复检查门窗、电器等是否关闭。",
                "我喜欢收集和整理某类物品。",
                "我对某些领域有超出常人的知识储备。",
                "我喜欢提前很久规划事情。",
                "我的物品有固定的摆放位置，不喜欢被移动。",
                "我每天的生活习惯很有规律。",
                "我会在头脑中反复回想某些事情。",
                "我对某些数字或颜色有特别的偏好。",
                "我喜欢把东西整理得井井有条。",
                "我喜欢深入了解一个主题直到完全掌握。",
                "我会因为小事不如意而影响整天的心情。",
                "我喜欢重复看同一部电影或读同一本书。",
                "我对时间安排很在意，不喜欢被打乱。"
            ];
            
            // 社交理解维度 (16题)
            const socialUnderstandingQuestions = [
                "我有时听不懂别人的言外之意。",
                "我分不清别人是在开玩笑还是认真说。",
                "我常常觉得自己像个局外人。",
                "我需要别人把话说明白才能理解。",
                "我不太擅长安慰别人。",
                "我很难理解为什么有些人会那么生气。",
                "我经常误解别人的意图。",
                "我不太能读懂别人的表情。",
                "我不太会察言观色。",
                "我觉得社交规则很复杂。",
                "我不太理解为什么有些话题会让人尴尬。",
                "我很难判断别人是否对我感兴趣。",
                "我不太会接别人的话茬。",
                "我常常不知道别人在暗示什么。",
                "我很难理解讽刺和幽默。",
                "我觉得自己不太懂人情世故。"
            ];
            
            // 情绪/创伤维度 (18题)
            const emotionTraumaQuestions = [
                "过去的一些经历经常出现在我的脑海中。",
                "我会因为小事突然情绪崩溃。",
                "我容易陷入低落情绪难以自拔。",
                "我的睡眠质量不太好。",
                "我会刻意回避某些话题或场景。",
                "我很难完全信任别人。",
                "我经常感到莫名的疲惫。",
                "我的情绪起伏比较大。",
                "我容易因为别人的话而难过很久。",
                "我害怕再次受到伤害。",
                "我有时候会做噩梦。",
                "我常常感到内心孤独。",
                "我很难从过去的阴影中走出来。",
                "我容易感到被伤害。",
                "我对某些话题特别敏感。",
                "我常常想一个人待着。",
                "我害怕失去重要的人。",
                "我有时候会莫名想哭。"
            ];
            
            // 边界敏感维度 (18题)
            const boundarySensitivityQuestions = [
                "别人未经允许用我的东西会让我生气。",
                "我需要自己的独立空间。",
                "被打扰的时候我会烦躁。",
                "我很难拒绝别人的要求。",
                "我不喜欢别人打听我的私事。",
                "我害怕别人离我太近。",
                "我很难说“不”。",
                "我会因为别人越界而感到不舒服。",
                "我需要明确的个人空间。",
                "我有时候会过度为别人的情绪负责。",
                "我觉得保持距离会更舒服。",
                "我不喜欢别人未经允许进入我的房间。",
                "我的私人空间很重要。",
                "我很难设立自己的边界。",
                "我会因为别人的期望而感到压力。",
                "我需要时间独处来充电。",
                "我害怕被他人过度依赖。",
                "我需要明确的界限感。"
            ];
            
            // 添加所有题目并分配权重
            for (let q of socialAnxietyQuestions) {
                questions.push({ text: q, weights: { "社交焦虑": 0.8 } });
            }
            for (let q of sensorySensitivityQuestions) {
                questions.push({ text: q, weights: { "感官敏感": 0.8 } });
            }
            for (let q of rigidInterestQuestions) {
                questions.push({ text: q, weights: { "刻板兴趣": 0.8 } });
            }
            for (let q of socialUnderstandingQuestions) {
                questions.push({ text: q, weights: { "社交理解": 0.8 } });
            }
            for (let q of emotionTraumaQuestions) {
                questions.push({ text: q, weights: { "情绪/创伤": 0.8 } });
            }
            for (let q of boundarySensitivityQuestions) {
                questions.push({ text: q, weights: { "边界敏感": 0.8 } });
            }
            
            return questions;
        }
        
        const questions = generateQuestions();
        const dims = ["社交焦虑", "感官敏感", "刻板兴趣", "社交理解", "情绪/创伤", "边界敏感"];
        let answers = new Array(questions.length).fill(null);
        let currentIndex = 0;
        let dimScores = { "社交焦虑": 0, "感官敏感": 0, "刻板兴趣": 0, "社交理解": 0, "情绪/创伤": 0, "边界敏感": 0 };
        let dimWeights = { "社交焦虑": 0, "感官敏感": 0, "刻板兴趣": 0, "社交理解": 0, "情绪/创伤": 0, "边界敏感": 0 };

        const welcomePage = document.getElementById('welcomePage');
        const quizPage = document.getElementById('quizPage');
        const reportPage = document.getElementById('reportPage');
        const startBtn = document.getElementById('startBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const questionText = document.getElementById('questionText');
        const ratingInput = document.getElementById('ratingInput');
        const progressText = document.getElementById('progressText');
        const reportContent = document.getElementById('reportContent');

        startBtn.addEventListener('click', function() {
            welcomePage.classList.remove('active');
            quizPage.classList.add('active');
            loadQuestion(0);
        });

        prevBtn.addEventListener('click', function() {
            if (currentIndex > 0) {
                saveCurrentAnswer();
                currentIndex--;
                loadQuestion(currentIndex);
            }
        });

        nextBtn.addEventListener('click', function() {
            if (ratingInput.value === '') {
                alert('请先输入一个分数（1-5，可带0.5）');
                return;
            }
            let val = parseFloat(ratingInput.value);
            if (isNaN(val) || val < 1 || val > 5) {
                alert('请输入1-5之间的数字');
                return;
            }
            saveCurrentAnswer();
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                loadQuestion(currentIndex);
            } else {
                calculateReport();
                quizPage.classList.remove('active');
                reportPage.classList.add('active');
                sendDataToCloudFunction();
            }
        });

        function loadQuestion(index) {
            questionText.innerText = questions[index].text;
            if (answers[index] !== null) {
                ratingInput.value = answers[index];
            } else {
                ratingInput.value = '';
            }
            progressText.innerText = `第 ${index + 1} / ${questions.length} 题`;
            prevBtn.disabled = index === 0;
        }

        function saveCurrentAnswer() {
            if (ratingInput.value !== '') {
                answers[currentIndex] = parseFloat(ratingInput.value);
            }
        }

        function calculateReport() {
            for (let d of dims) {
                dimScores[d] = 0;
                dimWeights[d] = 0;
            }
            
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] === null) continue;
                let rating = answers[i];
                let q = questions[i];
                for (let dim in q.weights) {
                    let w = q.weights[dim];
                    dimScores[dim] += w * (rating - 3.0);
                    dimWeights[dim] += Math.abs(w);
                }
            }
            
            let finalAvg = {};
            for (let d of dims) {
                if (dimWeights[d] > 0) {
                    finalAvg[d] = dimScores[d] / dimWeights[d] + 3.0;
                } else {
                    finalAvg[d] = 3.0;
                }
                finalAvg[d] = Math.min(5, Math.max(1, finalAvg[d]));
            }

            let html = '<div class="report-section">';
            html += '<div class="dimension-title">🌿 你的六维画像</div>';
            
            for (let d of dims) {
                let score = finalAvg[d];
                let desc = getDimensionDescription(d, score);
                html += `<div class="dimension-score">${d} · ${score.toFixed(2)}</div>`;
                html += `<div class="dimension-desc">${desc}</div>`;
            }
            html += '</div>';

            html += '<div class="overall-box">';
            html += '<div class="dimension-title">🧩 整体心理画像</div>';
            html += `<div class="overall-text">${getOverallDescription(finalAvg)}</div>`;
            html += '</div>';

            html += '<div class="overall-box">';
            html += '<div class="dimension-title">🔍 行为背后的原因</div>';
            html += `<div class="overall-text">${getWhyDescription(finalAvg)}</div>`;
            html += '</div>';

            html += '<div class="suggestions-box">';
            html += '<div class="dimension-title">💡 个性化建议</div>';
            html += `<div class="overall-text">${getSuggestions(finalAvg)}</div>`;
            html += '</div>';

            html += '<div class="possibilities">';
            html += '<div class="dimension-title">📌 可能性参考（仅为可能性，非诊断）</div>';
            html += `<div class="dimension-desc">${getPossibilities(finalAvg)}</div>`;
            html += '</div>';

            reportContent.innerHTML = html;
        }
        function getDimensionDescription(dim, score) {
    if (dim === "社交焦虑") {
        if (score >= 4.0) return "你在社交场合容易感到紧张，需要较多独处来恢复。你的内心可能常常在人群中悄悄绷紧一根弦，即使表面看起来平静。这种状态让你对社交活动有些回避，但也让你在独处时能获得深度思考的空间。";
        if (score >= 3.0) return "你偶尔会在社交中感到压力，但通常还能应对。你对社交环境保持适度警觉，既不会过度紧张，也不会完全麻木。这是一种健康的平衡，让你能在人群中保持自我。";
        if (score >= 2.5) return "你在社交中多数时候感到自在，只有特定场合会稍感紧张。你能够自然地与人交往，但也懂得在需要时给自己留出独处的空间。";
        return "你在社交中通常感到非常自在，不太需要额外恢复时间。你像一条灵活的鱼，能在各种社交水域中自如游动。这种特质让你拥有广阔的人际圈，但也别忘了偶尔停下来听听内心的声音。";
    }
    if (dim === "感官敏感") {
        if (score >= 4.0) return "你对声音、光线、触觉等感官输入比较敏感，容易受到环境影响。这让你能捕捉到他人忽略的细微之处——比如咖啡店的背景音乐、阳光透过窗帘的纹路。但这也意味着你更容易感到过度刺激，需要安静的环境来恢复。";
        if (score >= 3.0) return "你对某些感官刺激会有反应，但多数时候能适应环境。你的感官阈值处于中等水平，既不会过于迟钝，也不会轻易过载。你像一台有自动调节功能的接收器，能根据需要调高或调低敏感度。";
        if (score >= 2.5) return "你对感官刺激的敏感度偏低，大多数环境噪音或光线不会打扰到你。你能在较为嘈杂的环境中保持专注，但也可能因此错过一些细腻的感受。";
        return "你对感官刺激不太敏感，环境中的噪音、光线等很少打扰到你。这可能让你在嘈杂环境中依然能保持专注，像一株在风中依然挺立的植物。但也因此，你可能错过了一些他人能轻易感受到的细腻体验。";
    }
    if (dim === "刻板兴趣") {

        suggestions.push("• **社交沟通**：如果你觉得难以理解别人的暗示，可以直接问：“你刚才的意思是……吗？”真诚的沟通往往比猜测更有效。");
    } else if (avg["社交理解"] <= 2.5) {
        suggestions.push("• **社交洞察**：你的社交直觉很敏锐，但也要记得，不是所有人的想法都和你预判的一样。偶尔停下来，听听对方真实的表达。");
    } else {
        suggestions.push("• **社交智慧**：你的社交理解力很好，能平衡直觉和理性，继续保持这份敏锐。");
    }
    
    suggestions.push("• **最后的提醒**：这个测试是你了解自己的一个窗口，而不是定义你的标签。每个人都有独特的特质组合，你现在的样子已经足够好。如果需要更专业的帮助，可以联系心理咨询师，他们能提供更个性化的支持。");
    
    return suggestions.join("\n\n");
}

function getPossibilities(avg) {
    let list = [];
    if (avg["感官敏感"] >= 3.8 && avg["刻板兴趣"] >= 3.8 && avg["社交理解"] >= 3.8) {
        list.push("自闭谱系特质（如阿斯伯格）—— 你可能在某些方面与典型神经发育者不同，比如对社交暗示不敏感、有强烈的特定兴趣。但这只是神经多样性的表现，不代表“异常”。");
    }
    if (avg["社交焦虑"] >= 4.0) {
        list.push("社交焦虑倾向—— 你对社交场合的紧张感较为明显，这可能影响你的人际关系，但通过适当调节可以缓解。");
    }
    if (avg["感官敏感"] >= 4.0 && avg["情绪/创伤"] >= 3.8) {
        list.push("高敏感人格（HSP）—— 你对外界和内心的刺激都有深刻的感受力，这是一种天赋，让你能体验世界的细腻层次，约15-20%的人具有这种特质。");
    }
    if (avg["情绪/创伤"] >= 4.0 && avg["边界敏感"] >= 4.0) {
        list.push("回避型应对或创伤反应—— 过去的经历让你学会了用回避保护自己，这是生存智慧。但如果它阻碍了你想要的亲密，可能需要慢慢调整。");
    }
    if (avg["感官敏感"] >= 3.8 && avg["边界敏感"] >= 3.8 && avg["社交焦虑"] < 3.5) {
        list.push("内向高敏感特质—— 你享受独处，对环境敏感，但并不害怕社交。你是一个典型的“内向者”，需要独处来充电。");
    }
    if (list.length === 0) {
        list.push("没有特别明显的倾向，更多是你独特的个性。你的特质组合很难被简单归类，这正是你独一无二的地方。");
    }
    return list.join("\n\n");
}
